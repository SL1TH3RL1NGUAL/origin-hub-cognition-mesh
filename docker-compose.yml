version: "3.9"

services:
  nats:
    image: nats:2.10
    container_name: nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js"]

  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports:
      - "6379:6379"
      - "8001:8001"

  insightproxylayer:
    build: ./insightproxylayer
    container_name: insightproxylayer
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - nats
      - redis
    ports:
      - "8000:8000"

  lab_pod_a:
    build: ./lab_pod
    container_name: lab_pod_a
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379/0
      - LAB_POD_ID=lab_pod_a
    depends_on:
      - nats
      - redis

  lab_pod_b:
    build: ./lab_pod
    container_name: lab_pod_b
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379/0
      - LAB_POD_ID=lab_pod_b
    depends_on:
      - nats
      - redis
